name: Analysis Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'chapters/**'
      - 'pyproject.toml'
      - '.github/workflows/pipeline.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to analyze (e.g. Baseline, Week24)'
        required: false
        default: 'Week24'
      model_ref:
        description: 'Git ref for rat-hindlimb-model (branch or tag)'
        required: false
        default: 'main'

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ----------------------------------------------------------------
  # Job 1: Install deps + validate project structure
  # ----------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Validate project structure
        run: |
          uv run python -c "
          from rat_vml.analysis.subject_groups import SUBJECT_TO_GROUP
          print(f'Subject groups loaded: {len(SUBJECT_TO_GROUP)} subjects')
          assert len(SUBJECT_TO_GROUP) > 50, f'Expected 50+ subjects, got {len(SUBJECT_TO_GROUP)}'
          print('✓ Subject groups validated')
          "

      - name: Validate analysis module imports
        run: |
          uv run python -c "
          from rat_vml.analysis.events import GaitEvents, validate_walking_trial
          from rat_vml.analysis.io import rrd_to_trc, rrd_to_fp_mot
          from rat_vml.analysis.pipeline import run_subject, aggregate_group
          from rat_vml.analysis.plots import plot_kinematics, plot_kinetics
          from rat_vml.analysis.queries import RerunCatalog
          print('✓ All analysis module imports validated')
          "

  # ----------------------------------------------------------------
  # Job 2: Download .rrd catalog + build subjects.csv
  # ----------------------------------------------------------------
  catalog:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Cache .rrd catalog
        uses: actions/cache@v4
        id: cache-rrd
        with:
          path: data/rrd
          key: rrd-catalog-${{ hashFiles('scripts/ingest.py') }}
          restore-keys: rrd-catalog-

      - name: Download .rrd files from HuggingFace
        if: steps.cache-rrd.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python scripts/ingest.py pull \
            --repo hudsonburke/rat-hindlimb-mocap \
            -o data/rrd/
          echo "=== .rrd files ==="
          ls -lh data/rrd/*.rrd 2>/dev/null | head -10 || echo "No .rrd files"

      - name: Build subjects.csv from catalog
        run: |
          uv run python scripts/catalog.py subjects \
            data/rrd/ \
            -o data/subjects.csv 2>&1 | tee subjects.log
          echo "=== subjects.csv ==="
          head -5 data/subjects.csv 2>/dev/null || echo "No subjects.csv"

      - name: Query catalog for valid trials
        run: |
          uv run python scripts/catalog.py query data/rrd/ --side right 2>&1 || \
            echo "Query skipped (DuckDB rrd extension not available in CI)"

      - name: Upload catalog and subjects
        uses: actions/upload-artifact@v4
        with:
          name: catalog-data
          path: |
            data/rrd/
            data/subjects.csv
          if-no-files-found: ignore
          retention-days: 7

  # ----------------------------------------------------------------
  # Job 3: Run analysis pipeline (manual dispatch only)
  # ----------------------------------------------------------------
  analysis:
    needs: catalog
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Download model
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL_REF=${{ github.event.inputs.model_ref || 'main' }}
          git clone --depth=1 -b "$MODEL_REF" \
            https://github.com/hudsonburke/rat-hindlimb-model.git \
            /tmp/model
          ls /tmp/model/models/osim/rat_hindlimb_bilateral.osim

      - name: Download catalog data from previous job
        uses: actions/download-artifact@v4
        with:
          name: catalog-data
          path: data/

      - name: Run analysis pipeline
        run: |
          uv run python scripts/run_analysis.py \
            --data-dir data \
            --model /tmp/model/models/osim/rat_hindlimb_bilateral.osim \
            --session ${{ github.event.inputs.session || 'Baseline' }} \
            2>&1 | tee analysis.log

      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: data/figures/
          if-no-files-found: ignore

      - name: Upload analysis log
        uses: actions/upload-artifact@v4
        with:
          name: analysis-log
          path: analysis.log
          if-no-files-found: ignore

  # ----------------------------------------------------------------
  # Job 4: Render manuscript
  # ----------------------------------------------------------------
  render:
    needs: [validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render manuscript
        run: quarto render

      - name: Upload rendered manuscript
        uses: actions/upload-artifact@v4
        with:
          name: manuscript
          path: _site/
          if-no-files-found: ignore
